<svg width="1280" height="820" viewBox="0 0 1280 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="820" rx="36" fill="#FBF6EF"/>
  <rect x="42" y="42" width="1196" height="736" rx="30" fill="#FFFDF8" stroke="#E7D9C9" stroke-width="2"/>
  <text x="78" y="108" fill="#7F3415" font-size="23" font-family="Arial, sans-serif" letter-spacing="2">图 4 · 系统演化图</text>
  <text x="78" y="154" fill="#241913" font-size="44" font-family="Georgia, serif" font-weight="700">工具 → 产品 → 平台 → 联合认知体</text>
  <text x="78" y="196" fill="#6B5C53" font-size="22" font-family="Arial, sans-serif">这不是“体量越来越大”而已，而是系统组织能力、治理能力和连续性能力在提升。</text>

  <g>
    <rect x="82" y="292" width="242" height="274" rx="28" fill="#FFF1E4" stroke="#E4B07F" stroke-width="2.5"/>
    <text x="114" y="348" fill="#8A3B12" font-size="20" font-family="Arial, sans-serif" letter-spacing="1.5">TOOL</text>
    <text x="114" y="394" fill="#241913" font-size="38" font-family="Georgia, serif" font-weight="700">工具</text>
    <text x="114" y="432" fill="#6B5C53" font-size="20" font-family="Arial, sans-serif">做一件明确的事</text>
    <text x="114" y="462" fill="#6B5C53" font-size="20" font-family="Arial, sans-serif">范围较小</text>
    <text x="114" y="492" fill="#6B5C53" font-size="20" font-family="Arial, sans-serif">结构较简单</text>

    <rect x="370" y="266" width="254" height="324" rx="28" fill="#F8ECDf" stroke="#D8C091" stroke-width="2.5"/>
    <text x="402" y="322" fill="#9A6A32" font-size="20" font-family="Arial, sans-serif" letter-spacing="1.5">PRODUCT</text>
    <text x="402" y="368" fill="#241913" font-size="38" font-family="Georgia, serif" font-weight="700">产品</text>
    <text x="402" y="406" fill="#6B5C53" font-size="20" font-family="Arial, sans-serif">围绕一类用户问题</text>
    <text x="402" y="436" fill="#6B5C53" font-size="20" font-family="Arial, sans-serif">提供完整体验</text>
    <text x="402" y="466" fill="#6B5C53" font-size="20" font-family="Arial, sans-serif">需要多模块协作</text>
    <text x="402" y="496" fill="#6B5C53" font-size="20" font-family="Arial, sans-serif">开始形成产品逻辑</text>

    <rect x="674" y="236" width="266" height="386" rx="28" fill="#EFE5DC" stroke="#CDA98E" stroke-width="2.5"/>
    <text x="706" y="292" fill="#8C6950" font-size="20" font-family="Arial, sans-serif" letter-spacing="1.5">PLATFORM</text>
    <text x="706" y="338" fill="#241913" font-size="38" font-family="Georgia, serif" font-weight="700">平台</text>
    <text x="706" y="376" fill="#6B5C53" font-size="20" font-family="Arial, sans-serif">承载多条流程与能力</text>
    <text x="706" y="406" fill="#6B5C53" font-size="20" font-family="Arial, sans-serif">强调边界、复用、扩展</text>
    <text x="706" y="436" fill="#6B5C53" font-size="20" font-family="Arial, sans-serif">不是单一功能集合</text>
    <text x="706" y="466" fill="#6B5C53" font-size="20" font-family="Arial, sans-serif">而是长期底座</text>

    <rect x="974" y="204" width="240" height="450" rx="28" fill="#ECE7DB" stroke="#AEB28D" stroke-width="2.5"/>
    <text x="1006" y="260" fill="#5D6A57" font-size="18" font-family="Arial, sans-serif" letter-spacing="1.2">COGNITIVE SYSTEM</text>
    <text x="1006" y="306" fill="#241913" font-size="36" font-family="Georgia, serif" font-weight="700">联合认知体</text>
    <text x="1006" y="344" fill="#6B5C53" font-size="20" font-family="Arial, sans-serif">不只承载功能</text>
    <text x="1006" y="374" fill="#6B5C53" font-size="20" font-family="Arial, sans-serif">还形成认知对象</text>
    <text x="1006" y="404" fill="#6B5C53" font-size="20" font-family="Arial, sans-serif">动作治理</text>
    <text x="1006" y="434" fill="#6B5C53" font-size="20" font-family="Arial, sans-serif">结果回流</text>
    <text x="1006" y="464" fill="#6B5C53" font-size="20" font-family="Arial, sans-serif">连续性积累</text>
  </g>

  <g stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M324 430H346" stroke="#8A3B12"/>
    <path d="M334 418L358 430L334 442" stroke="#8A3B12"/>
    <path d="M624 430H650" stroke="#9A6A32"/>
    <path d="M636 418L660 430L636 442" stroke="#9A6A32"/>
    <path d="M940 430H958" stroke="#66725F"/>
    <path d="M946 418L970 430L946 442" stroke="#66725F"/>
  </g>
</svg>
