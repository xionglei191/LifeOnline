<svg width="1360" height="860" viewBox="0 0 1360 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1360" height="860" rx="36" fill="#FBF6EF"/>
  <rect x="42" y="42" width="1276" height="776" rx="30" fill="#FFFDF8" stroke="#E7D9C9" stroke-width="2"/>
  <text x="78" y="108" fill="#7F3415" font-size="23" font-family="Arial, sans-serif" letter-spacing="2">图 3 · 写代码 vs 做工程</text>
  <text x="78" y="154" fill="#241913" font-size="42" font-family="Georgia, serif" font-weight="700">写代码（Coding） vs 软件工程（Engineering）</text>
  <text x="78" y="196" fill="#6B5C53" font-size="21" font-family="Arial, sans-serif">会写代码 ≠ 会做软件。工程关心的是系统的组织、生命周期和长期可维护性。</text>

  <!-- Left: Writing Code -->
  <rect x="94" y="250" width="530" height="480" rx="30" fill="#FFF2E7" stroke="#E4B07F" stroke-width="2.5"/>
  <text x="240" y="316" fill="#241913" font-size="34" font-family="Georgia, serif" font-weight="700">写代码 Coding</text>
  <text x="134" y="370" fill="#6B5C53" font-size="21" font-family="Arial, sans-serif">• 关注的是"这段逻辑怎么实现"</text>
  <text x="134" y="410" fill="#6B5C53" font-size="21" font-family="Arial, sans-serif">• 像是写一篇文章中的一个段落</text>
  <text x="134" y="460" fill="#8A3B12" font-size="20" font-family="Arial, sans-serif">典型动作：</text>
  <text x="134" y="498" fill="#6B5C53" font-size="20" font-family="Arial, sans-serif">  ✦ 写一个函数 Function</text>
  <text x="134" y="534" fill="#6B5C53" font-size="20" font-family="Arial, sans-serif">  ✦ 修一个 Bug</text>
  <text x="134" y="570" fill="#6B5C53" font-size="20" font-family="Arial, sans-serif">  ✦ 做一个页面组件 Component</text>
  <text x="134" y="606" fill="#6B5C53" font-size="20" font-family="Arial, sans-serif">  ✦ 写一段数据处理逻辑</text>
  <text x="134" y="660" fill="#66725F" font-size="19" font-family="Arial, sans-serif" font-style="italic">作用范围：单个文件 / 单个功能</text>

  <!-- Right: Engineering -->
  <rect x="736" y="250" width="530" height="480" rx="30" fill="#EEF2E8" stroke="#AEB28D" stroke-width="2.5"/>
  <text x="846" y="316" fill="#241913" font-size="34" font-family="Georgia, serif" font-weight="700">软件工程 Engineering</text>
  <text x="776" y="370" fill="#6B5C53" font-size="21" font-family="Arial, sans-serif">• 关注的是"整个系统怎么组织"</text>
  <text x="776" y="410" fill="#6B5C53" font-size="21" font-family="Arial, sans-serif">• 像是规划一本书的结构和章节</text>
  <text x="776" y="460" fill="#5D6A57" font-size="20" font-family="Arial, sans-serif">典型动作：</text>
  <text x="776" y="498" fill="#6B5C53" font-size="20" font-family="Arial, sans-serif">  ✦ 设计模块边界 Module Boundaries</text>
  <text x="776" y="534" fill="#6B5C53" font-size="20" font-family="Arial, sans-serif">  ✦ 定义接口协议 API Contract</text>
  <text x="776" y="570" fill="#6B5C53" font-size="20" font-family="Arial, sans-serif">  ✦ 管理依赖和版本 Dependencies</text>
  <text x="776" y="606" fill="#6B5C53" font-size="20" font-family="Arial, sans-serif">  ✦ 搭测试体系 Testing Framework</text>
  <text x="776" y="660" fill="#66725F" font-size="19" font-family="Arial, sans-serif" font-style="italic">作用范围：整个系统 / 整个项目生命周期</text>

  <rect x="250" y="760" width="860" height="50" rx="18" fill="#F8EFE4" stroke="#E7D9C9"/>
  <text x="304" y="792" fill="#241913" font-size="20" font-family="Georgia, serif" font-weight="700">AI 可以加速写代码，但系统怎么组织、边界怎么画、优先级怎么排，仍然靠人。</text>
</svg>
