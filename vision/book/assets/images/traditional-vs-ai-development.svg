<svg width="1360" height="920" viewBox="0 0 1360 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1360" height="920" rx="36" fill="#FBF6EF"/>
  <rect x="42" y="42" width="1276" height="836" rx="30" fill="#FFFDF8" stroke="#E7D9C9" stroke-width="2"/>
  <text x="78" y="108" fill="#7F3415" font-size="23" font-family="Arial, sans-serif" letter-spacing="2">图 10 · 开发方式对比图</text>
  <text x="78" y="154" fill="#241913" font-size="44" font-family="Georgia, serif" font-weight="700">传统开发 vs AI 辅助开发</text>
  <text x="78" y="196" fill="#6B5C53" font-size="22" font-family="Arial, sans-serif">变化不在于“人没用了”，而在于人的角色从单纯执行者，更明显地转向组织者和判断者。</text>

  <rect x="94" y="256" width="534" height="500" rx="30" fill="#FFF2E7" stroke="#E4B07F" stroke-width="2.5"/>
  <text x="132" y="322" fill="#241913" font-size="38" font-family="Georgia, serif" font-weight="700">传统开发</text>
  <text x="132" y="364" fill="#8A3B12" font-size="20" font-family="Arial, sans-serif">Traditional Development</text>
  <text x="132" y="430" fill="#6B5C53" font-size="22" font-family="Arial, sans-serif">• 更多靠人手逐步完成分析、编码、测试</text>
  <text x="132" y="472" fill="#6B5C53" font-size="22" font-family="Arial, sans-serif">• 产出速度更受个人手速与经验影响</text>
  <text x="132" y="514" fill="#6B5C53" font-size="22" font-family="Arial, sans-serif">• 思考与执行大多绑定在同一人身上</text>
  <text x="132" y="556" fill="#6B5C53" font-size="22" font-family="Arial, sans-serif">• 文档、测试、重构常常被拖后</text>
  <text x="132" y="598" fill="#6B5C53" font-size="22" font-family="Arial, sans-serif">• 优势：过程扎实、可控、心智模型稳定</text>
  <text x="132" y="640" fill="#6B5C53" font-size="22" font-family="Arial, sans-serif">• 缺点：很多重复劳动必须靠人工硬扛</text>

  <rect x="732" y="256" width="534" height="500" rx="30" fill="#EEF2E8" stroke="#AEB28D" stroke-width="2.5"/>
  <text x="770" y="322" fill="#241913" font-size="38" font-family="Georgia, serif" font-weight="700">AI 辅助开发</text>
  <text x="770" y="364" fill="#5D6A57" font-size="20" font-family="Arial, sans-serif">AI-Assisted Development</text>
  <text x="770" y="430" fill="#6B5C53" font-size="22" font-family="Arial, sans-serif">• AI 可同时辅助分析、设计、编码、测试</text>
  <text x="770" y="472" fill="#6B5C53" font-size="22" font-family="Arial, sans-serif">• 产出速度更快，试错成本更低</text>
  <text x="770" y="514" fill="#6B5C53" font-size="22" font-family="Arial, sans-serif">• 人更像组织者、判断者、治理者</text>
  <text x="770" y="556" fill="#6B5C53" font-size="22" font-family="Arial, sans-serif">• 风险：更容易漂、堆、假进展、低价值忙碌</text>
  <text x="770" y="598" fill="#6B5C53" font-size="22" font-family="Arial, sans-serif">• 关键：任务书、验证、主线、边界必须更清楚</text>
  <text x="770" y="640" fill="#6B5C53" font-size="22" font-family="Arial, sans-serif">• 优势：可以把很多低层重复劳动外包给 AI</text>

  <rect x="190" y="792" width="980" height="68" rx="22" fill="#F8EFE4" stroke="#E7D9C9"/>
  <text x="226" y="835" fill="#241913" font-size="21" font-family="Georgia, serif" font-weight="700">结论：AI 改变的是效率结构，不是工程本质；真正稀缺的反而是主线判断力、系统组织力与治理能力。</text>
</svg>
