<svg width="1400" height="860" viewBox="0 0 1400 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="860" rx="36" fill="#FBF6EF"/>
  <rect x="44" y="44" width="1312" height="772" rx="30" fill="#FFFDF8" stroke="#E7D9C9" stroke-width="2"/>
  <text x="80" y="108" fill="#7F3415" font-size="23" font-family="Arial, sans-serif" letter-spacing="2">图 11 · 最小闭环 Minimum Viable Loop</text>
  <text x="80" y="154" fill="#241913" font-size="42" font-family="Georgia, serif" font-weight="700">任何系统的生命，从一条闭环开始</text>
  <text x="80" y="196" fill="#6B5C53" font-size="21" font-family="Arial, sans-serif">先做完整但最小的一条通路，比做十个半成品页面更有价值。</text>

  <!-- Circular loop with 6 nodes -->
  <rect x="520" y="240" width="200" height="80" rx="20" fill="#FFF1E4" stroke="#E4B07F" stroke-width="2.5"/>
  <text x="558" y="286" fill="#241913" font-size="24" font-family="Georgia, serif" font-weight="700">① 接收输入</text>

  <rect x="880" y="310" width="200" height="80" rx="20" fill="#F8ECDf" stroke="#D8C091" stroke-width="2.5"/>
  <text x="912" y="356" fill="#241913" font-size="24" font-family="Georgia, serif" font-weight="700">② 理解意图</text>

  <rect x="1000" y="470" width="220" height="80" rx="20" fill="#EFE5DC" stroke="#CDA98E" stroke-width="2.5"/>
  <text x="1026" y="516" fill="#241913" font-size="24" font-family="Georgia, serif" font-weight="700">③ 产生动作</text>

  <rect x="800" y="620" width="240" height="80" rx="20" fill="#ECE7DB" stroke="#AEB28D" stroke-width="2.5"/>
  <text x="830" y="666" fill="#241913" font-size="24" font-family="Georgia, serif" font-weight="700">④ 审查与执行</text>

  <rect x="400" y="620" width="240" height="80" rx="20" fill="#F7E8DF" stroke="#D8B091" stroke-width="2.5"/>
  <text x="438" y="666" fill="#241913" font-size="24" font-family="Georgia, serif" font-weight="700">⑤ 产出结果</text>

  <rect x="200" y="470" width="240" height="80" rx="20" fill="#FFF2E8" stroke="#D6B08A" stroke-width="2.5"/>
  <text x="232" y="516" fill="#241913" font-size="24" font-family="Georgia, serif" font-weight="700">⑥ 反馈与积累</text>

  <!-- Arrows connecting nodes in a loop -->
  <g stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M720 280C780 278 840 290 870 310" stroke="#8A3B12"/>
    <path d="M856 302L880 320L864 328" stroke="#8A3B12"/>

    <path d="M1060 390C1070 420 1070 440 1060 470" stroke="#9A6A32"/>
    <path d="M1048 456L1060 480L1072 456" stroke="#9A6A32"/>

    <path d="M1040 550C1010 580 970 610 940 620" stroke="#8C6950"/>
    <path d="M952 612L930 630L946 638" stroke="#8C6950"/>

    <path d="M800 660C740 660 680 660 640 660" stroke="#66725F"/>
    <path d="M652 648L630 660L652 672" stroke="#66725F"/>

    <path d="M400 660C340 640 290 580 270 550" stroke="#A06A47"/>
    <path d="M282 558L260 538L266 562" stroke="#A06A47"/>

    <path d="M320 470C360 400 420 320 510 280" stroke="#B88439" stroke-dasharray="8 6"/>
    <path d="M498 288L520 272L502 266" stroke="#B88439"/>
    <text x="290" y="370" fill="#B88439" font-size="16" font-family="Arial, sans-serif">结果回流到下一轮</text>
  </g>

  <!-- English labels -->
  <text x="560" y="336" fill="#6B5C53" font-size="15" font-family="Arial, sans-serif">Input</text>
  <text x="916" y="406" fill="#6B5C53" font-size="15" font-family="Arial, sans-serif">Understanding</text>
  <text x="1038" y="566" fill="#6B5C53" font-size="15" font-family="Arial, sans-serif">Action Candidate</text>
  <text x="842" y="716" fill="#6B5C53" font-size="15" font-family="Arial, sans-serif">Review &amp; Execution</text>
  <text x="452" y="716" fill="#6B5C53" font-size="15" font-family="Arial, sans-serif">Outcome</text>
  <text x="236" y="566" fill="#6B5C53" font-size="15" font-family="Arial, sans-serif">Reintegration &amp; Continuity</text>

  <!-- Center callout -->
  <rect x="500" y="440" width="360" height="100" rx="20" fill="#FFF8EF" stroke="#E5D7C6"/>
  <text x="536" y="480" fill="#241913" font-size="22" font-family="Georgia, serif" font-weight="700">这条闭环一旦跑通</text>
  <text x="536" y="516" fill="#6B5C53" font-size="19" font-family="Arial, sans-serif">系统就"活了"，可以开始扩展了</text>
</svg>
