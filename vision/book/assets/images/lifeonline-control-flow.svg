  <rect x="316" y="574" width="344" height="148" rx="28" fill="#FFF8EF" stroke="#E5D7C6"/>
  <text x="350" y="628" fill="#241913" font-size="30" font-family="Georgia, serif" font-weight="700">回流 Reintegration</text>
  <text x="350" y="664" fill="#6B5C53" font-size="19" font-family="Arial, sans-serif">结果被总结、解释、组织</text>
  <text x="350" y="694" fill="#6B5C53" font-size="19" font-family="Arial, sans-serif">形成 next action / evidence / summary</text>

  <rect x="760" y="560" width="360" height="164" rx="28" fill="#F7F1E6" stroke="#D5C09C"/>
  <text x="796" y="616" fill="#241913" font-size="30" font-family="Georgia, serif" font-weight="700">连续性 Continuity</text>
  <text x="796" y="652" fill="#6B5C53" font-size="19" font-family="Arial, sans-serif">高价值结果进入长期资产</text>
  <text x="796" y="682" fill="#6B5C53" font-size="19" font-family="Arial, sans-serif">形成 EventNode / ContinuityRecord</text>

  <path d="M1264 428C1264 514 1112 572 660 572" stroke="#B88439" stroke-width="4"/>
  <path d="M672 560L642 572L672 584" stroke="#B88439" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1106" y="534" fill="#7A5A34" font-size="18" font-family="Arial, sans-serif">Outcome → Reintegration</text>

  <path d="M660 642H740" stroke="#7F3415" stroke-width="4" stroke-linecap="round"/>
  <path d="M728 630L752 642L728 654" stroke="#7F3415" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="662" y="620" fill="#7F3415" font-size="18" font-family="Arial, sans-serif">summary / evidence</text>

  <path d="M930 560C930 484 854 460 828 460" stroke="#66725F" stroke-width="4" stroke-dasharray="10 10"/>
  <path d="M818 472L794 458L822 448" stroke="#66725F" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="946" y="510" fill="#66725F" font-size="18" font-family="Arial, sans-serif">连续性晋升要回到治理</text>

  <rect x="84" y="532" width="206" height="176" rx="24" fill="#FFF6EC" stroke="#E7D9C9"/>
  <text x="112" y="580" fill="#241913" font-size="25" font-family="Georgia, serif" font-weight="700">第一阶段重点</text>
  <text x="112" y="620" fill="#6B5C53" font-size="18" font-family="Arial, sans-serif">不是先做更多页面，</text>
  <text x="112" y="648" fill="#6B5C53" font-size="18" font-family="Arial, sans-serif">而是让这条闭环</text>
  <text x="112" y="676" fill="#6B5C53" font-size="18" font-family="Arial, sans-serif">先真实成立，</text>
  <text x="112" y="704" fill="#6B5C53" font-size="18" font-family="Arial, sans-serif">再逐步长出控制面。</text>
